name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run core tests
        run: python -m pytest packages/core/tests -v

      - name: Run API tests
        run: python -m pytest apps/api/tests -v

      - name: Run worker tests
        run: python -m pytest apps/worker/tests -v

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Run lint
        working-directory: apps/web
        run: npm run lint

      - name: Run typecheck
        working-directory: apps/web
        run: npm run typecheck

      - name: Run tests
        working-directory: apps/web
        run: npm test

      - name: Run build
        working-directory: apps/web
        run: npm run build
